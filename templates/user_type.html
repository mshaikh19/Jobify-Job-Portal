{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select Your Role | Jobify</title>
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
  <style>
    .radio-box {
      transition: all 0.2s ease;
    }
    .radio-box:hover {
      transform: scale(1.03);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-200 flex items-center justify-center min-h-screen font-sans py-8">

  <div class="bg-white shadow-2xl rounded-2xl p-10 w-full max-w-xl">
    <h1 class="text-3xl font-bold text-center text-dark-blue-purple mb-6">Welcome to Jobify 👋</h1>

    <form method="POST" class="space-y-8">
      {% csrf_token %}

      <!-- Email input -->
      <div class="py-2">
        <label for="email" class="block text-gray-700 font-medium mb-2">Your Email</label>
        <input
          type="email"
          name="email"
          id="email"
          required
          placeholder="e.g. john.doe@example.com"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-dark-blue focus:outline-none"
        />
      </div>

      <!-- User type selection -->
      <div class="py-2">
        <p class="text-gray-700 font-medium mb-3">I am a...</p>
        <div class="grid grid-cols-1 gap-4">
          <label class="cursor-pointer">
            <!-- Radio button hidden but focusable -->
            <input type="radio" name="user_type" value="employer" class="absolute opacity-0 peer" required />
            <div class="peer-checked:ring-2 peer-checked:ring-green-600 border border-gray-300 px-6 py-4 rounded-lg shadow-sm text-center bg-gray-50">
              <h3 class="font-semibold text-lg mb-1 text-green-700">Employer</h3>
              <p class="text-sm text-gray-500">Hire top talent for your team</p>
            </div>
          </label>
          
          <label class="cursor-pointer">
            <!-- Radio button hidden but focusable -->
            <input type="radio" name="user_type" value="job_seeker" class="absolute opacity-0 peer invisible" required />
            <div class="peer-checked:ring-2 peer-checked:ring-blue-600 border border-gray-300 px-6 py-4 rounded-lg shadow-sm text-center bg-gray-50">
              <h3 class="font-semibold text-lg mb-1 text-blue-700">Job Seeker</h3>
              <p class="text-sm text-gray-500">Find your dream job</p>
            </div>
          </label>
          
        </div>
      </div>

      <!-- Submit button -->
      <div class="py-2">
        <input
          type="submit"
          value="Continue"
          class="w-full bg-dark-blue-purple hover:bg-purple-800 text-white font-semibold py-3 rounded-lg shadow-md transition"
          
        >
      </div>
    </form>
    <ul>
      {% if messages %}
        {% for message in messages %}
          <li>{{message}}</li>
        {% endfor %}
      {% endif %}
    </ul>
  </div>

 
</body>
</html>
